<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Professional Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="appleGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="chemicalBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="riceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <!-- Professional Shadow -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient Border -->
  <circle cx="250" cy="250" r="240" fill="white" stroke="url(#primaryGradient)" stroke-width="6" filter="url(#dropShadow)"/>
  
  <!-- Inner Decorative Ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-dasharray="8,4"/>
  
  <!-- Main Container Circle -->
  <circle cx="250" cy="250" r="195" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  
  <!-- CENTRAL GLOBE DESIGN -->
  <g transform="translate(250, 250)">
    <!-- Globe Background -->
    <circle cx="0" cy="0" r="100" fill="#fef9f3" opacity="0.5"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#primaryGradient)" stroke-width="3"/>
    
    <!-- Globe Meridians -->
    <ellipse cx="0" cy="0" rx="100" ry="30" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="100" ry="60" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="30" ry="100" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="60" ry="100" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Central Shipping Container Icon -->
    <g transform="translate(0, 5)">
      <!-- Container Body -->
      <rect x="-35" y="-25" width="70" height="40" rx="3" fill="url(#primaryGradient)" stroke="#c2410c" stroke-width="2" filter="url(#softShadow)"/>
      
      <!-- Container Lines -->
      <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
      <line x1="-35" y1="5" x2="35" y2="5" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
      <line x1="-20" y1="-25" x2="-20" y2="15" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
      <line x1="0" y1="-25" x2="0" y2="15" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
      <line x1="20" y1="-25" x2="20" y2="15" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
      
      <!-- Container Text -->
      <text x="0" y="-2" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">NJ</text>
    </g>
    
    <!-- Orbiting Export/Import Arrows -->
    <!-- Export Arrow (Circular - Going Out) -->
    <g transform="rotate(-90)">
      <path d="M 0,-115 L 0,-140" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#softShadow)"/>
      <path d="M 0,-140 L -7,-132 M 0,-140 L 7,-132" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-125" r="3" fill="#16a34a"/>
    </g>
    
    <!-- Import Arrow (Circular - Coming In) -->
    <g transform="rotate(90)">
      <path d="M 0,-115 L 0,-140" stroke="#dc2626" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#softShadow)"/>
      <path d="M 0,-140 L -7,-132 M 0,-140 L 7,-132" stroke="#dc2626" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-125" r="3" fill="#dc2626"/>
    </g>
  </g>
  
  <!-- PRODUCT ICONS AROUND THE LOGO -->
  
  <!-- Apple (Top Left) -->
  <g transform="translate(120, 100)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="32" fill="url(#appleGradient)"/>
    <ellipse cx="0" cy="-36" rx="3.5" ry="10" fill="#854d0e"/>
    <path d="M -2,-36 Q -10,-44 -12,-50 Q -9,-52 -5,-48 Q -2,-44 -1,-38" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
    <ellipse cx="-10" cy="-8" rx="6" ry="8" fill="#fff" opacity="0.4"/>
    <ellipse cx="8" cy="5" rx="4" ry="5" fill="#fff" opacity="0.25"/>
  </g>
  
  <!-- Rice/Grain (Top Right) -->
  <g transform="translate(380, 100)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="32" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
    <g transform="translate(0, 0)">
      <ellipse cx="-12" cy="-5" rx="4" ry="11" fill="url(#riceGradient)" stroke="#d97706" stroke-width="1"/>
      <ellipse cx="0" cy="-8" rx="4" ry="11" fill="url(#riceGradient)" stroke="#d97706" stroke-width="1"/>
      <ellipse cx="12" cy="-5" rx="4" ry="11" fill="url(#riceGradient)" stroke="#d97706" stroke-width="1"/>
      <ellipse cx="-6" cy="5" rx="4" ry="11" fill="url(#riceGradient)" stroke="#d97706" stroke-width="1"/>
      <ellipse cx="6" cy="5" rx="4" ry="11" fill="url(#riceGradient)" stroke="#d97706" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Chemical Flask (Bottom Left) -->
  <g transform="translate(120, 400)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <path d="M -14,-18 L -10,-28 L -10,-35 L 10,-35 L 10,-28 L 14,-18 Q 18,2 14,12 Q 12,20 0,20 Q -12,20 -14,12 Q -18,2 -14,-18 Z" 
          fill="url(#chemicalBlue)" stroke="#1e40af" stroke-width="2"/>
    <rect x="-8" y="-38" width="16" height="4" rx="2" fill="#1e40af"/>
    <ellipse cx="0" cy="-5" rx="10" ry="8" fill="#93c5fd" opacity="0.5"/>
    <circle cx="-5" cy="-12" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="4" cy="2" r="3.5" fill="#fff" opacity="0.6"/>
    <text x="0" y="0" font-family="Arial" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">H₂O</text>
  </g>
  
  <!-- Pomegranate/Fruit (Bottom Right) -->
  <g transform="translate(380, 400)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="32" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="24" fill="#dc2626"/>
    <path d="M -10,-26 L -6,-34 L -2,-30 L 2,-34 L 6,-30 L 10,-26 L 6,-20 L 2,-22 L -2,-20 L -6,-22 Z" 
          fill="#991b1b" stroke="#7f1d1d" stroke-width="1.5"/>
    <g opacity="0.3">
      <circle cx="-8" cy="4" r="2.5" fill="#fff"/>
      <circle cx="6" cy="-6" r="2.5" fill="#fff"/>
      <circle cx="0" cy="8" r="2" fill="#fff"/>
    </g>
  </g>
  
  <!-- TEXT ELEMENTS -->
  
  <!-- Company Name - Top Curved -->
  <path id="topArc" d="M 80,250 A 170,170 0 0,1 420,250" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="32" font-weight="bold" letter-spacing="4" fill="#1f2937">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      NARAYAN JIBHAU
    </textPath>
  </text>
  
  <!-- Tagline - Bottom Curved -->
  <path id="bottomArc" d="M 80,250 A 170,170 0 0,0 420,250" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="3" fill="url(#primaryGradient)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      EXPORT • IMPORT
    </textPath>
  </text>
  
  <!-- EXPORT Label (Top) -->
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle" opacity="0.8">EXPORT</text>
  
  <!-- IMPORT Label (Bottom) -->
  <text x="250" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle" opacity="0.8">IMPORT</text>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="70" cy="70" r="4" fill="url(#goldGradient)"/>
    <circle cx="430" cy="70" r="4" fill="url(#goldGradient)"/>
    <circle cx="70" cy="430" r="4" fill="url(#goldGradient)"/>
    <circle cx="430" cy="430" r="4" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Subtle Corner Accent Lines -->
  <g stroke="url(#goldGradient)" stroke-width="2" opacity="0.4" fill="none">
    <path d="M 50,80 L 50,50 L 80,50"/>
    <path d="M 420,50 L 450,50 L 450,80"/>
    <path d="M 450,420 L 450,450 L 420,450"/>
    <path d="M 80,450 L 50,450 L 50,420"/>
  </g>
</svg>